# ── LLM Configuration ────────────────────────────────────────────────────────
llm:
  provider: gemini                          # groq | gemini | openai | openai_compatible | nemotron | glm
  model: gemini-flash-lite-latest
  temperature: 0.1

# ── Safety Rules ─────────────────────────────────────────────────────────────
safety:
  max_retries: 1

  # Layer 1 — fast keyword/domain check (no LLM call)
  payment_url_keywords:
    - checkout
    - payment
    - pay
    - billing
    - "cart/review"
    - "order/confirm"
    - "order/summary"
    - "order/place"

  payment_domains:
    - razorpay.com
    - stripe.com
    - payu.in
    - paytm.com
    - paypal.com
    - instamojo.com
    - ccavenue.com
    - cashfree.com
    - phonepe.com
    - juspay.in

  payment_text_keywords:
    - card number
    - cvv
    - expiry date
    - upi id
    - enter otp
    - enter your pin
    - credit card
    - debit card
    - net banking
    - emi option
    - pay now
    - place order
    - confirm payment

  personal_info_fields:
    - name
    - full name
    - first name
    - last name
    - email
    - e-mail
    - phone
    - mobile
    - address
    - street
    - city
    - state
    - pincode
    - zip code
    - postal code
    - dob
    - date of birth
    - id number
    - passport
    - aadhaar
    - pan
    - ssn
    - driver license

  destructive_action_keywords:
    - delete
    - cancel
    - unsubscribe
    - remove
    - modify booking
    - revoke
    - terminate

# ── agent-browser Backend ────────────────────────────────────────────────────
agent_browser:
  binary: agent-browser
  default_wait: networkidle
  wait_timeout_ms: 30000
  snapshot_flags:
    - "-i"
    - "--json"

# ── Research Backend (webwright route) ───────────────────────────────────────
# Uses the same LLM provider/API key as above — no separate model config.
webwright:
  output_dir: logs
  max_pages: 2
  page_timeout_seconds: 20

# ── Logging ──────────────────────────────────────────────────────────────────
logging:
  screenshots: true
  save_snapshots: true
  log_dir: logs
